<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <title>CashManager - Dashboard</title>
</head>
<body>
<!--Barra de navegação-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">CashManager</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="contas.html">Contas</a></li>
                    <li class="nav-item"><a class="nav-link" href="categorias.html">Categorias</a></li>
                    <li class="nav-item"><a class="nav-link" href="operacoes.html">Operações</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html" id="btnSair">Sair</a></li>
                    <li class="nav-item ms-3">
                    <button class="btn btn-link text-light btn-sm mt-1" id="btnTema">⚫</button>
                    </li>                   
                </ul>
            </div>
        </div>
    </nav>

 <!-- Cards de resumo -->
        <div class="container mt-4">
            <div class="mb-4">
                <label class="form-label fw-bold">Exibindo informações de:</label>
                <select class="form-select w-auto" id="selectConta">
                    <option value="todas">Todas as contas</option>
                </select>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Saldo Total</h5>
                        <p class="card-text fs-4" id="saldoTotal">R$ 0,00</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-success mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Entradas</h5>
                        <p class="card-text fs-4" id="totalEntradas">R$ 0,00</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-danger mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Saídas</h5>
                        <p class="card-text fs-4" id="totalSaidas">R$ 0,00</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Últimas operações -->
        <h5 class="mt-4">Últimas Operações</h5>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Valor</th>
                    <th>Tipo</th>
                    <th>Conta</th>
                    <th>Data</th>
                </tr>
            </thead>
            <tbody id="tabelaOperacoes">
                <!-- preenchido pelo JS -->
            </tbody>
        </table>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/tema.js"></script>
<script defer src="js/dashboard.js"></script>  
</body>
</html>
